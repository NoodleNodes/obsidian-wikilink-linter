name: Release

# Fires whenever you push a version tag (e.g. git tag 1.2.0 && git push origin 1.2.0)
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# Required for softprops/action-gh-release to create releases
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build-fast

      # Uploads main.js, manifest.json, and styles.css as release assets.
      # BRAT and Obsidian both fetch these three files by name from the release.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
